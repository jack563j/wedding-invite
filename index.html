<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WeddingInvite — Create Your Dream Wedding Website</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Great+Vibes&family=DM+Serif+Display&family=Libre+Baskerville:wght@400;700&family=Rozha+One&family=Yatra+One&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@1&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0d0118;font-family:'Inter',sans-serif;color:white;overflow-x:hidden;}
input,textarea,select,button{font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px;}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.5);}

/* ═══════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0}5%{opacity:.9}90%{opacity:.7}100%{transform:translateY(-110vh) rotate(720deg);opacity:0}}
@keyframes petalFall{0%{transform:translateY(-60px) rotate(0deg);opacity:0}8%{opacity:.9}90%{opacity:.7}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
@keyframes goldShimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes kenBurns{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.12) translate(-2%,-2%)}}
@keyframes kenBurns2{0%{transform:scale(1.08) translate(2%,2%)}100%{transform:scale(1) translate(0,0)}}
@keyframes photoFloat{0%,100%{transform:translateY(0px) rotate(var(--rot,0deg))}50%{transform:translateY(-14px) rotate(var(--rot,0deg))}}
@keyframes curtainLeft{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
@keyframes curtainRight{0%{transform:translateX(0)}100%{transform:translateX(100%)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.9)}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes genShimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
/* NEW theme animation keyframes */
@keyframes lanternSway{0%,100%{transform:rotate(-8deg) translateY(0)}50%{transform:rotate(8deg) translateY(-6px)}}
@keyframes marigoldDrop{0%{transform:translateY(-80px) rotate(0deg) scale(1);opacity:0}10%{opacity:1}85%{opacity:.9}100%{transform:translateY(110vh) rotate(600deg) scale(.7);opacity:0}}
@keyframes rangoliRotate{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes fireFlicker{0%,100%{text-shadow:0 0 8px #ff6b35,0 0 20px #ff6b35,0 0 40px #ff4500}50%{text-shadow:0 0 4px #ffd700,0 0 12px #ff8c00,0 0 30px #ff6b35}}
@keyframes starDrift{0%{transform:translate(0,0) scale(1);opacity:.6}50%{transform:translate(8px,-12px) scale(1.2);opacity:1}100%{transform:translate(-4px,6px) scale(.9);opacity:.4}}
@keyframes spotlightSweep{0%,100%{opacity:.08;transform:rotate(-15deg)}50%{opacity:.15;transform:rotate(15deg)}}
@keyframes curtainSway{0%,100%{transform:skewX(0deg)}50%{transform:skewX(2deg)}}
@keyframes petalDrift{0%{transform:translateY(0) rotate(0deg) translateX(0)}25%{transform:translateY(30vh) rotate(120deg) translateX(20px)}50%{transform:translateY(60vh) rotate(240deg) translateX(-15px)}75%{transform:translateY(80vh) rotate(360deg) translateX(10px)}100%{transform:translateY(110vh) rotate(480deg) translateX(0);opacity:0}}
@keyframes mehendiBorder{0%,100%{opacity:.18}50%{opacity:.32}}
@keyframes goldenGlow{0%,100%{box-shadow:0 0 20px rgba(201,168,76,.15),inset 0 0 30px rgba(201,168,76,.05)}50%{box-shadow:0 0 40px rgba(201,168,76,.3),inset 0 0 50px rgba(201,168,76,.1)}}
@keyframes emeraldPulse{0%,100%{box-shadow:0 0 0 0 rgba(136,192,90,.2)}50%{box-shadow:0 0 0 12px rgba(136,192,90,0)}}
@keyframes shootingStar{0%{transform:translate(-200px,-200px) rotate(45deg);opacity:0}10%{opacity:1}80%{opacity:.8}100%{transform:translate(calc(100vw + 200px),calc(100vh + 200px)) rotate(45deg);opacity:0}}
@keyframes haldiBurst{0%{transform:scale(1);opacity:.4}50%{transform:scale(1.3);opacity:.1}100%{transform:scale(1);opacity:.4}}
@keyframes theatreSpot{0%{opacity:0;transform:translateX(-60px) scaleY(.5)}20%{opacity:.12}80%{opacity:.08}100%{opacity:0;transform:translateX(60px) scaleY(1.2)}}
@keyframes inkDrop{0%{transform:scale(0);opacity:.8}60%{transform:scale(1.1);opacity:.4}100%{transform:scale(1);opacity:0}}
@keyframes borderMarch{0%{background-position:0 0,100% 0,100% 100%,0 100%}100%{background-position:40px 0,100% 40px,calc(100% - 40px) 100%,0 calc(100% - 40px)}}
@keyframes lotusBloom{0%,100%{transform:scale(1) rotate(0deg);opacity:.12}50%{transform:scale(1.08) rotate(5deg);opacity:.22}}

/* ═══════════════════════════════════════════
   SHIMMER TEXT
═══════════════════════════════════════════ */
.gold-shimmer{background:linear-gradient(90deg,#c9a84c,#f0d060,#c9a84c,#a07820,#f0d060,#c9a84c);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 3s linear infinite;}
.red-shimmer{background:linear-gradient(90deg,#ff6b6b,#cc2244,#ff6b6b,#ff4488,#cc2244);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 3s linear infinite;}

/* ═══════════════════════════════════════════
   SECTION REVEAL (IntersectionObserver)
═══════════════════════════════════════════ */
.sr{opacity:0;transform:translateY(35px);transition:opacity .9s cubic-bezier(.4,0,.2,1),transform .9s cubic-bezier(.4,0,.2,1);}
.sr.vis{opacity:1;transform:translateY(0);}
.sr-l{opacity:0;transform:translateX(-40px);transition:opacity .9s ease,transform .9s ease;}
.sr-l.vis{opacity:1;transform:translateX(0);}
.sr-r{opacity:0;transform:translateX(40px);transition:opacity .9s ease,transform .9s ease;}
.sr-r.vis{opacity:1;transform:translateX(0);}

/* ═══════════════════════════════════════════
   FORM PAGE
═══════════════════════════════════════════ */
#app-form{min-height:100vh;background:linear-gradient(135deg,#0d0118 0%,#160825 50%,#0d0118 100%);display:flex;flex-direction:column;align-items:center;padding:48px 16px;position:relative;overflow:hidden;}
#app-form .ambient1{position:fixed;top:10%;left:15%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.07),transparent);pointer-events:none;}
#app-form .ambient2{position:fixed;bottom:10%;right:10%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(220,40,100,.06),transparent);pointer-events:none;}

.form-wrap{width:100%;max-width:520px;position:relative;z-index:1;}

.form-header{text-align:center;margin-bottom:36px;animation:fadeUp .7s ease forwards;}
.form-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border-radius:50px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);margin-bottom:14px;}
.form-badge span:first-child{width:7px;height:7px;border-radius:50%;background:#c9a84c;animation:pulse 1.6s ease-in-out infinite;}
.form-badge span:last-child{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.4);}
.form-title{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:white;font-family:'Playfair Display',serif;margin-bottom:5px;}
.form-sub{color:rgba(255,255,255,.3);font-size:11px;letter-spacing:.2em;text-transform:uppercase;}

/* Step bar */
.step-bar{display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
.step-dot-wrap{display:flex;flex-direction:column;align-items:center;}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);}
.step-dot.done{background:#e91e8c;color:white;}
.step-dot.active{background:linear-gradient(135deg,#c9a84c,#e8c060);color:#1a0a0a;transform:scale(1.1);box-shadow:0 4px 20px rgba(201,168,76,.5);}
.step-label{font-size:10px;margin-top:4px;color:rgba(255,255,255,.3);letter-spacing:.05em;display:none;}
.step-label.active{color:#c9a84c;font-weight:600;}
@media(min-width:540px){.step-label{display:block;}}
.step-line{width:36px;height:1.5px;margin:0 4px;margin-bottom:14px;background:rgba(255,255,255,.1);transition:background .5s;}
.step-line.done{background:#c9a84c;}

/* Form card */
.form-card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:28px;box-shadow:0 40px 80px rgba(0,0,0,.4);max-height:68vh;overflow-y:auto;}
.form-card::-webkit-scrollbar{width:4px;}
.form-card::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

.step-panel{display:none;flex-direction:column;gap:15px;animation:fadeUp .4s ease forwards;}
.step-panel.active{display:flex;}

.step-heading{font-size:1.4rem;font-weight:700;color:white;font-family:'Playfair Display',serif;margin-bottom:4px;}
.step-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:4px;}

.field-group{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.45);}
.field-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px 15px;color:white;outline:none;font-size:14px;transition:border .2s,background .2s;width:100%;}
.field-input::placeholder{color:rgba(255,255,255,.25);}
.field-input:focus{border-color:rgba(201,168,76,.55);background:rgba(255,255,255,.09);}
textarea.field-input{resize:none;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Toggle */
.toggle-row{display:flex;align-items:center;gap:12px;padding:13px 15px;background:rgba(255,255,255,.04);border-radius:13px;border:1px solid rgba(255,255,255,.08);}
.toggle-label{color:rgba(255,255,255,.6);flex:1;font-size:13px;}
.toggle-btn{width:48px;height:26px;border-radius:13px;background:rgba(255,255,255,.15);position:relative;border:none;cursor:pointer;transition:background .3s;flex-shrink:0;}
.toggle-btn.on{background:#c9a84c;}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:left .3s;}
.toggle-btn.on .toggle-knob{left:25px;}

/* Event card in form */
.event-form-card{background:rgba(255,255,255,.04);border-radius:16px;border:1px solid rgba(255,255,255,.09);overflow:hidden;}
.event-photo-upload{height:90px;background:rgba(255,255,255,.03);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;transition:background .2s;position:relative;overflow:hidden;}
.event-photo-upload:hover{background:rgba(255,255,255,.06);}
.event-photo-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.7;}
.event-photo-upload .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);}
.event-photo-upload .hint{color:#c9a84c;font-size:11px;text-transform:uppercase;letter-spacing:.1em;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:8px;backdrop-filter:blur(4px);}
.event-photo-badge{position:absolute;top:8px;left:8px;width:26px;height:26px;border-radius:50%;background:#c9a84c;color:#1a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;}
.event-form-body{padding:13px 15px;display:flex;flex-direction:column;gap:9px;}
.event-form-header{display:flex;justify-content:space-between;align-items:center;}
.event-form-num{color:#c9a84c;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;}
.event-remove-btn{color:rgba(255,100,100,.5);background:none;border:none;cursor:pointer;font-size:11px;transition:color .2s;}
.event-remove-btn:hover{color:rgba(255,100,100,.9);}

/* Upload zone */
.upload-zone{border:1.5px dashed rgba(201,168,76,.25);border-radius:15px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover{border-color:rgba(201,168,76,.55);background:rgba(255,255,255,.03);}
.upload-zone .uz-icon{font-size:1.9rem;margin-bottom:6px;}
.upload-zone .uz-text{color:rgba(255,255,255,.45);font-size:12px;}
.photo-thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.thumb-wrap{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.thumb-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(220,50,50,.9);color:white;border:none;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;}
.thumb-wrap:hover .thumb-del{display:flex;}

/* Theme grid */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.theme-btn{position:relative;overflow:hidden;border-radius:14px;height:76px;border:2px solid rgba(255,255,255,.1);cursor:pointer;transition:all .3s;background:#000;}
.theme-btn:hover{border-color:rgba(255,255,255,.3);}
.theme-btn.selected{transform:scale(1.02);box-shadow:0 0 0 0 transparent;}
.theme-btn img{width:100%;height:100%;object-fit:cover;opacity:.45;display:block;}
.theme-btn .theme-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.theme-btn .theme-name{color:white;font-weight:700;font-size:12px;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.theme-btn .theme-desc{font-size:9px;margin-top:2px;opacity:.75;}
.theme-btn .theme-check{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:#c9a84c;color:#1a0a0a;font-size:9px;font-weight:bold;display:none;align-items:center;justify-content:center;}
.theme-btn.selected .theme-check{display:flex;}

/* Font list */
.font-list{display:flex;flex-direction:column;gap:8px;}
.font-btn{padding:11px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s;}
.font-btn:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.75);}
.font-btn.selected{border-color:#c9a84c;background:rgba(255,255,255,.08);color:#c9a84c;}
.font-btn .font-name{font-size:1.05rem;}
.font-btn .font-preview{font-size:12px;opacity:.4;}

/* Nav buttons */
.form-nav{display:flex;gap:10px;margin-top:22px;}
.btn-back{flex:1;padding:14px;border-radius:13px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:none;cursor:pointer;font-size:14px;transition:background .2s;}
.btn-back:hover{background:rgba(255,255,255,.13);}
.btn-next{flex:1;padding:14px;border-radius:13px;background:linear-gradient(135deg,#c9a84c,#e8c060);color:#1a0a0a;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:all .2s;box-shadow:0 8px 24px rgba(201,168,76,.35);}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(201,168,76,.45);}
.btn-next:disabled{background:rgba(255,255,255,.08);color:rgba(255,255,255,.25);cursor:not-allowed;transform:none;box-shadow:none;}
.btn-generate{flex:1;padding:14px;border-radius:13px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(135deg,#c9a84c,#e8c060,#c9a84c);background-size:200%;animation:genShimmer 2s linear infinite;color:#1a0a0a;box-shadow:0 8px 32px rgba(201,168,76,.4);}
.btn-generate:hover{transform:translateY(-1px);}

.btn-demo{width:100%;margin-top:14px;padding:12px;background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.22);font-size:13px;transition:color .2s;}
.btn-demo:hover{color:rgba(255,255,255,.5);}

/* Add event button */
.btn-add-event{width:100%;padding:12px;border:1.5px dashed rgba(201,168,76,.28);border-radius:13px;color:rgba(201,168,76,.6);background:none;cursor:pointer;font-size:13px;transition:all .2s;}
.btn-add-event:hover{border-color:rgba(201,168,76,.6);color:rgba(201,168,76,.9);}

/* ═══════════════════════════════════════════
   LOADING SCREEN
═══════════════════════════════════════════ */
#app-loading{display:none;min-height:100vh;background:linear-gradient(135deg,#0d0118,#180730);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;}
#app-loading .spin-ring{font-size:3.5rem;animation:spin 1.8s linear infinite;}
#app-loading h2{font-size:1.8rem;color:white;font-family:'Playfair Display',serif;margin:20px 0 10px;}
#app-loading p{color:rgba(255,255,255,.4);font-size:14px;margin-bottom:28px;}
.loading-dots{display:flex;gap:8px;justify-content:center;}
.loading-dots span{width:10px;height:10px;border-radius:50%;background:#c9a84c;animation:pulse .8s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;}
.loading-dots span:nth-child(3){animation-delay:.3s;}

/* ═══════════════════════════════════════════
   PREVIEW TOOLBAR
═══════════════════════════════════════════ */
#toolbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,2,20,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);}
#toolbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:11px 20px;gap:12px;flex-wrap:wrap;}
#toolbar-brand{display:flex;align-items:center;gap:10px;}
#toolbar-brand span:first-child{color:white;font-weight:700;font-family:'Playfair Display',serif;font-size:1rem;}
#toolbar-theme-badge{background:rgba(201,168,76,.15);color:#c9a84c;border-radius:6px;padding:2px 9px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
#toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
.tb-btn{padding:7px 14px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.tb-btn:hover{background:rgba(255,255,255,.18);color:white;}
.tb-btn.primary{background:#c9a84c;color:#1a0a0a;}
.tb-btn.primary:hover{background:#e8c060;}

/* ═══════════════════════════════════════════
   PREVIEW PAGE
═══════════════════════════════════════════ */
#app-preview{display:none;padding-top:50px;}

/* Hero */
.inv-hero{position:relative;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 100px;}
.hero-bg-wrap{position:absolute;inset:0;overflow:hidden;}
.hero-bg-img{position:absolute;inset:0;width:100%;height:110%;object-fit:cover;opacity:.3;}
.hero-bg-img.kb1{animation:kenBurns 14s ease-in-out infinite alternate;}
.hero-bg-img.kb2{animation:kenBurns2 16s ease-in-out infinite alternate;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.35) 0%,rgba(0,0,0,.1) 40%,rgba(0,0,0,.15) 70%,rgba(0,0,0,.65) 100%);}
.hero-photo-dots{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:5;}
.hero-photo-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.35);cursor:pointer;transition:all .4s;}
.hero-photo-dot.active{background:#c9a84c;width:22px;}
.hero-content{position:relative;z-index:10;max-width:740px;margin:0 auto;}
.hero-eyebrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:22px;}
.hero-eyebrow-line{height:1px;width:55px;opacity:.5;}
.hero-eyebrow-text{font-size:11px;text-transform:uppercase;letter-spacing:.5em;font-family:'Inter',sans-serif;}
.hero-title{font-size:clamp(3rem,10vw,7rem);font-weight:700;line-height:1.1;margin-bottom:14px;text-shadow:0 4px 40px rgba(0,0,0,.5);}
.hero-divider{display:flex;align-items:center;justify-content:center;gap:16px;margin:12px 0;}
.hero-divider-line{height:1px;width:80px;opacity:.35;}
.hero-ring{font-size:1.8rem;animation:pulse 3s ease-in-out infinite;}
.hero-date{font-size:1.05rem;letter-spacing:.06em;margin-top:4px;}
.hero-time{font-size:.95rem;letter-spacing:.12em;margin-top:3px;}

function fmtDate(d){
  if(!d)return"";
  return new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
function fmtTime(t){
  if(!t)return"";
  const[h,m]=t.split(":");
  return `${(+h%12)||12}:${m} ${+h>=12?"PM":"AM"}`;
}
function el(tag,attrs,html){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{ if(k==="class")e.className=v; else if(k==="style")e.style.cssText=v; else e.setAttribute(k,v); });
  if(html!=null)e.innerHTML=html;
  return e;
}
function show(id){document.getElementById(id).style.display="flex";}
function hide(id){document.getElementById(id).style.display="none";}
function showBlock(id){document.getElementById(id).style.display="block";}

// ══════════════════════════════════════════════
// STEP BAR
// ══════════════════════════════════════════════
function renderStepBar(){
  const bar=document.getElementById("step-bar");
  bar.innerHTML="";
  STEPS.forEach((s,i)=>{
    const wrap=el("div",{class:"step-dot-wrap"});
    const dot=el("div",{class:"step-dot"+(i<state.step?" done":i===state.step?" active":"")});
    dot.textContent=i<state.step?"✓":i+1;
    const lbl=el("div",{class:"step-label"+(i===state.step?" active":"")});
    lbl.textContent=s;
    wrap.append(dot,lbl);

    if(i<STEPS.length-1){

}
function inp(type,placeholder,val,key){
  const i=el("input",{class:"field-input",type,placeholder});
  i.value=val||"";
  i.addEventListener("input",e=>{ state.form[key]=e.target.value; renderNav(); });
  return i;
}
function txta(placeholder,val,key){
  const t=el("textarea",{class:"field-input",placeholder});
  t.value=val||"";
  t.addEventListener("input",e=>state.form[key]=e.target.value);
  return t;
}
function grid2(...children){
  const g=el("div",{class:"grid2"});
  g.append(...children);

}

function buildStep2(){

function buildEventFormCard(i){
  const ev=state.form.events[i];
  const card=el("div",{class:"event-form-card"});
  // Photo upload
  const photoArea=el("div",{class:"event-photo-upload"});
  const badge=el("div",{class:"event-photo-badge"},String(i+1));
  photoArea.append(badge);
  if(ev.photo){
    const img=el("img"); img.src=ev.photo;
    const ov=el("div",{class:"overlay"});
    const hint=el("span",{class:"hint"},"Change Photo");
    ov.append(hint); photoArea.append(img,ov);
  } else {
    photoArea.innerHTML+=`<span style="font-size:1.8rem;opacity:.4">📸</span><span style="color:#c9a84c;font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.6">Add Event Photo</span>`;
    photoArea.append(badge);
  }
  const fileInput=el("input",{type:"file",accept:"image/*",style:"display:none"});
  photoArea.append(fileInput);
  photoArea.addEventListener("click",()=>fileInput.click());
  fileInput.addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev2=>{
      state.form.events[i].photo=ev2.target.result;
      const newCard=buildEventFormCard(i);
      card.replaceWith(newCard);
    };
    r.readAsDataURL(f);
  });
  // Body
  const body=el("div",{class:"event-form-body"});
  const hdr=el("div",{class:"event-form-header"});
  hdr.append(el("span",{class:"event-form-num"},`Event ${i+1}`));

    const rmBtn=el("button",{class:"event-remove-btn"},"Remove ✕");
    rmBtn.addEventListener("click",()=>{
      state.form.events.splice(i,1);
      document.getElementById("event-list").innerHTML="";
      state.form.events.forEach((_,j)=>document.getElementById("event-list").append(buildEventFormCard(j)));
    });
    hdr.append(rmBtn);
  }
  function evInp(labelTxt,type,placeholder,key){
    const i2=el("input",{class:"field-input",type,placeholder});
    i2.value=ev[key]||"";
    i2.addEventListener("input",e=>state.form.events[i][key]=e.target.value);
    return fieldGroup(labelTxt,i2);
  }
  body.append(hdr, evInp("Event Name","text","e.g. Sangeet Night","name"),
    grid2(evInp("Date","date","","date"),evInp("Time","time","","time")),
    evInp("Location","text","Venue name","location"));
  card.append(photoArea,body);
  return card;
}
function buildStep3(){
  const wrap=el("div");
  wrap.append(el("div",{class:"step-heading"},"📸 Media Upload"));
  function uploadZone(label,icon,key){
    const sec=el("div",{style:"display:flex;flex-direction:column;gap:8px;"});
    sec.append(el("div",{class:"field-label"},label));
    const zone=el("div",{class:"upload-zone"});
    zone.innerHTML=`<div class="uz-icon">${icon}</div><div class="uz-text">Click to upload ${label.toLowerCase()}</div>`;
    const fi=el("input",{type:"file",accept:"image/*",multiple:true,style:"display:none"});
    zone.append(fi);
    zone.addEventListener("click",()=>fi.click());
    const thumbs=el("div",{class:"photo-thumbs"});
    function refresh(){
      thumbs.innerHTML="";
      (state.form[key]||[]).forEach((p,i)=>{
        const tw=el("div",{class:"thumb-wrap"});
        const img=el("img"); img.src=p;
        const del=el("button",{class:"thumb-del"},"✕");
        del.addEventListener("click",e=>{ e.stopPropagation(); state.form[key].splice(i,1); refresh(); });
        tw.append(img,del); thumbs.append(tw);
      });
    }
    fi.addEventListener("change",e=>{
      const files=Array.from(e.target.files);
      let done=0;
      files.forEach(f=>{
        const r=new FileReader();
        r.onload=ev=>{ state.form[key]=(state.form[key]||[]); state.form[key].push(ev.target.result); done++; if(done===files.length)refresh(); };
        r.readAsDataURL(f);
      });
    });
    refresh();
    sec.append(zone,thumbs);
    return sec;
  }
  wrap.append(uploadZone("Hero Background Photos","🌅","heroPhotos"),uploadZone("Gallery Photos","📷","photos"));
  return wrap;
}

    btn.append(img,ov,chk);
    btn.addEventListener("click",()=>{
      state.form.theme=name;

    });
    flist.append(btn);
  });
  wrap.append(flist);
  return wrap;
}

function canProceed(){
  const f=state.form;
  if(state.step===0)return f.groomName&&f.brideName;
  if(state.step===1)return f.weddingDate&&f.venue;
  if(state.step===2)return f.events.some(e=>e.name);
  return true;
}
function renderNav(){
  const nav=document.getElementById("form-nav");
  nav.innerHTML="";
  if(state.step>0){
    const back=el("button",{class:"btn-back"},"← Back");
    back.addEventListener("click",()=>{ state.step--; renderAll(); });
    nav.append(back);
  }
  if(state.step<4){
    const next=el("button",{class:"btn-next"+(canProceed()?"":" disabled")},"Continue →");
    if(!canProceed())next.disabled=true;
    next.addEventListener("click",()=>{ if(canProceed()){ state.step++; renderAll(); } });
    nav.append(next);
  } else {
    const gen=el("button",{class:"btn-generate"},"✨ Generate My Invitation");
    gen.addEventListener("click",()=>generateInvite(state.form));
    nav.append(gen);
  }
}
function renderAll(){
  renderStepBar();
  renderStep();
  renderNav();
}

// ══════════════════════════════════════════════
// COUNTDOWN
// ══════════════════════════════════════════════
function startCountdown(date,accent,fontFamily,containerId){
  const el=document.getElementById(containerId);
  if(!el)return;
  function tick(){
    const diff=new Date(date)-new Date();
    if(diff<=0)return;
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    el.innerHTML=["Days","Hrs","Min","Sec"].map((l,i)=>{
      const v=[d,h,m,s][i];
      return `<div class="cd-box"><div class="cd-num" style="background:${accent}18;border:1.5px solid ${accent}50;color:${accent};font-family:${fontFamily}">${String(v).padStart(2,"0")}</div><div class="cd-label">${l}</div></div>`;
    }).join("");
  }
  tick();
  setInterval(tick,1000);
}

// ══════════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════════
function createParticles(type,accent,container){
  const count=type==="star"?28:type==="sparkle"?18:12;
  for(let i=0;i<count;i++){
    const p=document.createElement("div");
    p.className=`particle ${type}`;
    const x=Math.random()*100;
    const delay=Math.random()*12;
    const dur=6+Math.random()*8;
    if(type==="star"){
      p.style.cssText=`left:${x}%;top:${Math.random()*90}%;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;background:${accent};animation-duration:${1.5+Math.random()*2}s;animation-delay:${delay}s;opacity:.3;`;
    } else if(type==="sparkle"){
      p.style.cssText=`left:${x}%;top:${Math.random()*90}%;font-size:${14+Math.random()*12}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${delay}s;`;
      p.textContent="✨";
    } else if(type==="petal"){
      p.style.cssText=`left:${x}%;top:-40px;font-size:${14+Math.random()*14}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
      p.textContent="🌸";
    } else if(type==="marigold"){
      p.style.cssText=`left:${x}%;top:-40px;font-size:${16+Math.random()*16}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
      p.textContent="🌼";
    }
    container.append(p);
  }
}

// ══════════════════════════════════════════════
// GENERATE QR
// ══════════════════════════════════════════════
function buildQR(svgEl,label,labelEl){
  svgEl.innerHTML="";
  svgEl.setAttribute("viewBox","0 0 80 80");
  for(let xi=0;xi<8;xi++){
    for(let yi=0;yi<8;yi++){
      const x=xi*10, y=yi*10;
      const s=(xi*8+yi)*17+xi+yi;
      const fill=s%3!==0||(x<30&&y<30)||(x>50&&y<30)||(x<30&&y>50);
      if(fill){
        const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
        r.setAttribute("x",x+1); r.setAttribute("y",y+1);
        r.setAttribute("width",8); r.setAttribute("height",8);
        r.setAttribute("fill","#1a0a2e"); r.setAttribute("rx",1);
        svgEl.append(r);
      }
    }
  }
  if(labelEl)labelEl.textContent=label;
}

function generateInvite(form){

    const slug=(form.coupleTitle||`${form.groomName}-${form.brideName}`).toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
    const id=`${slug}-${Date.now().toString(36)}`;
    state.inviteId=id;
    try{localStorage.setItem("invite_"+id,JSON.stringify(form));}catch(e){}

    buildPreview(form);

    hide("app-form");
    document.getElementById("app-loading").style.display="none";
    showBlock("app-preview");
    document.getElementById("toolbar").style.display="block";
    document.getElementById("toolbar-theme-badge").textContent=form.theme;
    document.getElementById("toolbar-theme-badge").style.color=THEMES[form.theme].accent;

    // Theatre curtain
    if(form.theme==="Theatre"){
      const curtain=document.getElementById("curtain");
      curtain.style.display="block";
      const tassels=document.getElementById("curtain-tassels");
      tassels.innerHTML="";
      [15,30,50,70,85].forEach(()=>{ const t=document.createElement("div"); t.className="curtain-tassel"; tassels.append(t); });
      setTimeout(()=>{
        document.getElementById("curtain-left").classList.add("open-left");
        document.getElementById("curtain-right").classList.add("open-right");
        setTimeout(()=>curtain.style.display="none",2600);
      },400);
    }

    window.scrollTo(0,0);
    initScrollReveal();
  },1400);
}

// ══════════════════════════════════════════════
// PER-SECTION THEME ANIMATIONS
// ══════════════════════════════════════════════
function addSectionThemeAnim(sec, theme, accent){
  sec.style.position="relative";
  sec.style.overflow="hidden";
  const wrap = document.createElement("div");
  wrap.className = "sec-anim-wrap";
  sec.insertBefore(wrap, sec.firstChild);

  if(theme === "Royal Mughal"){
    // Mehndi dashed border
    const border = document.createElement("div");
    border.className = "sec-mehndi-border";
    border.style.borderImage = `repeating-linear-gradient(90deg,${accent}55 0,${accent}55 8px,transparent 8px,transparent 18px) 1`;
    wrap.append(border);
    // Lotus corner ornaments
    ["tl","tr","bl","br"].forEach(pos=>{
      const c=document.createElement("div"); c.className=`sec-corner ${pos}`; c.textContent="🪷"; wrap.append(c);
    });
    // Subtle golden arch watermark
    const archSvg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    archSvg.setAttribute("viewBox","0 0 500 120"); archSvg.style.cssText=`position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(500px,100%);opacity:.06;pointer-events:none;`;
    archSvg.innerHTML=`<path d="M40,120 L40,50 Q250,0 460,50 L460,120" fill="none" stroke="${accent}" stroke-width="1.5"/><path d="M80,120 L80,65 Q250,20 420,65 L420,120" fill="none" stroke="${accent}" stroke-width="1"/>`;
    wrap.append(archSvg);
  }

  else if(theme === "Sindoor"){
    // Marigolds raining from top edges
    for(let i=0;i<10;i++){
      const p=document.createElement("div"); p.className="particle marigold";
      p.textContent="🌼"; p.style.cssText=`left:${Math.random()*100}%;top:-40px;font-size:${14+Math.random()*12}px;animation-duration:${7+Math.random()*6}s;animation-delay:${Math.random()*8}s;`;
      wrap.append(p);
    }
    // Rangoli SVG watermark center
    const rSvg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    rSvg.setAttribute("viewBox","0 0 200 200");
    rSvg.className="sec-rangoli-bg"; rSvg.style.width="280px"; rSvg.style.height="280px";
    let rp=""; for(let d=0;d<12;d++) rp+=`<ellipse cx="100" cy="100" rx="80" ry="14" fill="none" stroke="${accent}" stroke-width="1" transform="rotate(${d*15},100,100)"/>`;
    rp+=`<circle cx="100" cy="100" r="10" fill="${accent}" opacity=".5"/>`;
    [40,60,75].forEach(r=> rp+=`<circle cx="100" cy="100" r="${r}" fill="none" stroke="${accent}" stroke-width=".5"/>`);
    rSvg.innerHTML=rp; wrap.append(rSvg);
    // Ember glow dots
    for(let i=0;i<6;i++){
      const e=document.createElement("div"); e.className="sec-ember";
      const sz=4+Math.random()*6;
      e.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${accent};opacity:.25;animation-delay:${Math.random()*3}s;animation-duration:${3+Math.random()*3}s;`;
      wrap.append(e);
    }
  }

  else if(theme === "Haldi"){
    // Dense petal rain
    for(let i=0;i<14;i++){
      const p=document.createElement("div"); p.className="sec-petal-corner";
      p.textContent=["🌸","🌼","🍃","🌺"][i%4];
      p.style.cssText=`left:${Math.random()*100}%;top:-60px;font-size:${12+Math.random()*14}px;animation-duration:${9+Math.random()*7}s;animation-delay:${Math.random()*10}s;`;
      wrap.append(p);
    }
    // Saffron ink ripple circles
    for(let i=0;i<5;i++){
      const c=document.createElement("div"); c.className="sec-haldi-circle";
      const sz=80+i*70;
      c.style.cssText=`left:50%;top:50%;width:${sz}px;height:${sz}px;margin-left:${-sz/2}px;margin-top:${-sz/2}px;border-color:${accent}30;animation-delay:${i*1.2}s;animation-duration:${6+i}s;`;
      wrap.append(c);
    }
    // Corner turmeric splash
    ["0%,0%","100%,0%","0%,100%","100%,100%"].forEach((pos,i)=>{
      const d=document.createElement("div");
      const [lft,top]=pos.split(",");
      d.style.cssText=`position:absolute;left:${lft};top:${top};width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,${accent}30,transparent);pointer-events:none;animation:haldiBurst ${4+i}s ease-in-out infinite;animation-delay:${i*.8}s;`;
      wrap.append(d);
    });
  }

  else if(theme === "Nawabi"){
    // Lanterns along top
    [15,35,55,75,90].forEach((x,i)=>{
      const l=document.createElement("div"); l.className="sec-nawabi-lantern";
      l.textContent="🏮"; l.style.cssText=`left:${x}%;top:8px;animation-delay:${i*0.7}s;`;
      wrap.append(l);
    });
    // Dense star field per section
    for(let i=0;i<20;i++){
      const s=document.createElement("div"); s.className="sec-star-dot";
      const sz=1+Math.random()*3;
      s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${accent};opacity:.35;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
      wrap.append(s);
    }
    // Emerald border glow line top & bottom
    const topLine=document.createElement("div");
    topLine.style.cssText=`position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,${accent}60,transparent);animation:mehendiBorder 4s ease-in-out infinite;`;
    const botLine=document.createElement("div");
    botLine.style.cssText=`position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,${accent}60,transparent);animation:mehendiBorder 4s ease-in-out infinite;animation-delay:2s;`;
    wrap.append(topLine,botLine);
  }

  else if(theme === "Theatre"){
    // Two sweeping spotlights
    [20,70].forEach((x,i)=>{
      const sp=document.createElement("div"); sp.className="sec-spotlight";
      sp.style.cssText=`left:${x}%;animation-delay:${i*4}s;`;
      wrap.append(sp);
    });
    // Stage floor line
    const floor=document.createElement("div"); floor.className="sec-stage-floor"; wrap.append(floor);
    // Side curtain strips
    const cl=document.createElement("div"); cl.className="sec-curtain-strip left-strip"; wrap.append(cl);
    const cr=document.createElement("div"); cr.className="sec-curtain-strip right-strip"; wrap.append(cr);
    // Sparkle bursts
    for(let i=0;i<12;i++){
      const sp=document.createElement("div"); sp.className="sec-sparkle-burst";
      sp.textContent="✨"; sp.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;font-size:${10+Math.random()*14}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*4}s;opacity:.5;`;
      wrap.append(sp);
    }
    // Gold horizontal divider lines top/bottom
    const topDiv=document.createElement("div");
    topDiv.style.cssText=`position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 0%,${accent}80 20%,${accent} 50%,${accent}80 80%,transparent 100%);`;
    wrap.append(topDiv);
  }

  else if(theme === "Garden"){
    // Dense petal showers
    for(let i=0;i<16;i++){
      const p=document.createElement("div"); p.className="sec-garden-petal";
      p.textContent=["🌸","🌺","🌷","🌼","🍃"][i%5];
      p.style.cssText=`left:${Math.random()*100}%;top:-50px;font-size:${10+Math.random()*14}px;animation-duration:${10+Math.random()*8}s;animation-delay:${Math.random()*12}s;opacity:.7;`;
      wrap.append(p);
    }
    // Soft pastel glow orbs
    for(let i=0;i<4;i++){
      const o=document.createElement("div"); o.className="sec-glow-orb";
      const sz=120+i*80;
      o.style.cssText=`left:${[10,80,25,65][i]}%;top:${[20,60,70,30][i]}%;width:${sz}px;height:${sz}px;margin-left:${-sz/2}px;margin-top:${-sz/2}px;background:radial-gradient(circle,${accent}12,transparent);animation-delay:${i*2}s;animation-duration:${8+i*2}s;`;
      wrap.append(o);
    }
    // Vine-like SVG top edge
    const vineSvg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    vineSvg.setAttribute("viewBox","0 0 1200 60"); vineSvg.style.cssText=`position:absolute;top:0;left:0;right:0;width:100%;opacity:.12;pointer-events:none;`;
    vineSvg.innerHTML=`<path d="M0,40 Q150,10 300,40 Q450,70 600,40 Q750,10 900,40 Q1050,70 1200,40" fill="none" stroke="${accent}" stroke-width="2"/><path d="M0,20 Q100,5 200,20 Q300,35 400,20 Q500,5 600,20 Q700,35 800,20 Q900,5 1000,20 Q1100,35 1200,20" fill="none" stroke="${accent}" stroke-width="1" opacity=".5"/>`;
    wrap.append(vineSvg);
  }

  else if(theme === "Starlight"){
    // Shooting stars
    for(let i=0;i<4;i++){
      const ss=document.createElement("div"); ss.className="sec-shooting-star";
      ss.style.cssText=`top:${15+i*20}%;animation-duration:${6+i*3}s;animation-delay:${i*4+Math.random()*3}s;`;
      wrap.append(ss);
    }
    // Nebula glow blobs
    for(let i=0;i<3;i++){
      const nb=document.createElement("div"); nb.className="sec-nebula";
      const sz=200+i*120;
      nb.style.cssText=`left:${[10,60,40][i]}%;top:${[20,55,75][i]}%;width:${sz}px;height:${sz}px;margin-left:${-sz/2}px;margin-top:${-sz/2}px;background:radial-gradient(circle,${["rgba(160,196,255","rgba(196,160,255","rgba(160,220,255"][i]},0.06),transparent);animation-delay:${i*3}s;animation-duration:${10+i*2}s;`;
      wrap.append(nb);
    }
    // Constellation dot clusters
    for(let i=0;i<30;i++){
      const d=document.createElement("div"); d.className="sec-constellation-dot";
      const sz=1+Math.random()*2.5;
      d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${accent};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*6}s;`;
      wrap.append(d);
    }
    // Horizontal constellation lines
    const conSvg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    conSvg.setAttribute("viewBox","0 0 1200 200"); conSvg.style.cssText=`position:absolute;inset:0;width:100%;height:100%;opacity:.04;pointer-events:none;`;
    const pts=Array.from({length:12},()=>({x:Math.random()*1200,y:Math.random()*200}));
    let lines=""; pts.forEach((p,i)=>{ if(i>0) lines+=`<line x1="${pts[i-1].x}" y1="${pts[i-1].y}" x2="${p.x}" y2="${p.y}" stroke="${accent}" stroke-width="1"/>`; });
    pts.forEach(p=> lines+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${accent}"/>`);
    conSvg.innerHTML=lines; wrap.append(conSvg);
  }
  // wrap already inserted at sec top via insertBefore
}

// ══════════════════════════════════════════════
// BUILD PREVIEW HTML
// ══════════════════════════════════════════════
function buildPreview(form){
  const preview=document.getElementById("app-preview");
  preview.innerHTML="";
  const t=THEMES[form.theme]||THEMES["Royal Mughal"];
  const fontFamily=`'${form.fontStyle}', ${t.font}, ${t.bodyFont}`;
  const tMain=t.isDark?"#ffffff":"#1a0a0a";
  const tSub=t.isDark?"rgba(255,255,255,.65)":"rgba(0,0,0,.55)";
  const title=form.coupleTitle||(form.groomName&&form.brideName?`${form.groomName} & ${form.brideName}`:"Jai & Priya");
  const gallery=(form.photos&&form.photos.length>0)?form.photos:SAMPLE_GALLERY;
  const heroImgs=(form.heroPhotos&&form.heroPhotos.length>0)?form.heroPhotos:[t.hero];

  preview.style.background=t.grad;
  preview.style.fontFamily=fontFamily;
  preview.style.color=tMain;

  // ── HERO ──
  const hero=document.createElement("div");
  hero.className="inv-hero";

  // Background images
  const bgWrap=el("div",{class:"hero-bg-wrap"});
  heroImgs.forEach((src,i)=>{
    const img=el("img",{class:`hero-bg-img ${i%2===0?"kb1":"kb2"}`});
    img.src=src; img.style.opacity=i===0?"0.3":"0";
    img.dataset.idx=i;
    bgWrap.append(img);
  });
  const overlay=el("div",{class:"hero-overlay"});
  bgWrap.append(overlay);
  hero.append(bgWrap);

  // Auto-cycle hero photos
  if(heroImgs.length>1){
    let cur=0;
    const imgs=bgWrap.querySelectorAll(".hero-bg-img");
    setInterval(()=>{
      imgs[cur].style.opacity="0"; imgs[cur].style.transition="opacity 1.5s";
      cur=(cur+1)%heroImgs.length;
      imgs[cur].style.opacity="0.3"; imgs[cur].style.transition="opacity 1.5s";
      const dots=hero.querySelectorAll(".hero-photo-dot");
      dots.forEach((d,i)=>d.classList.toggle("active",i===cur));
    },5000);
    // Dots
    const dotsEl=el("div",{class:"hero-photo-dots"});
    heroImgs.forEach((_,i)=>{ const d=el("div",{class:"hero-photo-dot"+(i===0?" active":"")}); dotsEl.append(d); });
    hero.append(dotsEl);
  }

  // Particles
  const particlesLayer=el("div",{class:"particles-layer"});
  createParticles(t.particles,t.accent,particlesLayer);
  hero.append(particlesLayer);

  // Mughal arch
  if(t.mughalArch){
    const arch=el("svg",{class:"mughal-arch",viewBox:"0 0 400 200",width:"400",height:"200"});
    arch.innerHTML=`<path d="M50,200 L50,80 Q200,0 350,80 L350,200" fill="none" stroke="${t.accent}" stroke-width="2"/><path d="M70,200 L70,90 Q200,20 330,90 L330,200" fill="none" stroke="${t.accent}" stroke-width="1"/>`;
    hero.append(arch);
  }
  // Rangoli
  if(t.rangoli){
    const rsvg=el("svg",{class:"rangoli-svg",viewBox:"0 0 200 200",width:"280",height:"280"});
    let paths="";
    for(let d=0;d<6;d++) paths+=`<ellipse cx="100" cy="100" rx="80" ry="18" fill="none" stroke="${t.accent}" stroke-width="1.5" transform="rotate(${d*30},100,100)"/>`;
    paths+=`<circle cx="100" cy="100" r="14" fill="${t.accent}" opacity=".35"/>`;
    rsvg.innerHTML=paths; hero.append(rsvg);
  }

  // Floating polaroid photos
  if(heroImgs.length>0){
    const fp=el("div",{class:"floating-photos"});
    const positions=[
      {top:"6%",left:"2%",w:"190px",h:"200px",rot:"-6deg",delay:"0s"},
      {top:"3%",right:"3%",w:"170px",h:"180px",rot:"5deg",delay:"1.1s"},
      {bottom:"8%",left:"1%",w:"155px",h:"165px",rot:"4deg",delay:"2.2s"},
      {bottom:"5%",right:"2%",w:"175px",h:"190px",rot:"-5deg",delay:"0.6s"},
      {top:"38%",left:"-1%",w:"135px",h:"145px",rot:"8deg",delay:"1.6s"},
    ];
    heroImgs.slice(0,5).forEach((src,i)=>{
      const pos=positions[i%positions.length];
      const item=el("div",{class:"fp-item"});
      item.style.cssText=`${pos.top?`top:${pos.top};`:""}${pos.bottom?`bottom:${pos.bottom};`:""}${pos.left?`left:${pos.left};`:""}${pos.right?`right:${pos.right};`:""}width:${pos.w};height:${pos.h};--rot:${pos.rot};animation-delay:${pos.delay};border:2.5px solid ${t.accent}45;box-shadow:0 8px 32px rgba(0,0,0,.5);`;
      const img=el("img"); img.src=src;
      item.append(img); fp.append(item);
    });
    hero.append(fp);
  }

  // Hero content
  const content=el("div",{class:"hero-content",style:"animation:fadeUp .8s ease forwards"});
  const eyebrow=el("div",{class:"hero-eyebrow"});
  eyebrow.innerHTML=`<div class="hero-eyebrow-line" style="background:${t.accent}"></div><span class="hero-eyebrow-text" style="color:${t.accent}">You Are Cordially Invited</span><div class="hero-eyebrow-line" style="background:${t.accent}"></div>`;

  const titleEl=el("div",{class:`hero-title ${t.shimmer}`});
  if(!t.shimmer)titleEl.style.color=tMain;
  titleEl.textContent=title;
  titleEl.style.fontFamily=fontFamily;

  const divider=el("div",{class:"hero-divider"});
  divider.innerHTML=`<div class="hero-divider-line" style="background:${t.accent}"></div><span class="hero-ring">💍</span><div class="hero-divider-line" style="background:${t.accent}"></div>`;

  content.append(eyebrow,titleEl,divider);
  if(form.weddingDate){
    content.append(el("div",{class:"hero-date",style:`color:${tSub}`},fmtDate(form.weddingDate)));
  }
  if(form.weddingTime){
    content.append(el("div",{class:"hero-time",style:`color:${t.accent}`},fmtTime(form.weddingTime)));
  }
  if(form.venue){
    content.append(el("div",{class:"hero-venue",style:`color:${tSub}`},"📍 "+form.venue));
  }
  if(form.weddingDate){
    const cdWrap=el("div",{class:"countdown",id:"countdown"});
    content.append(cdWrap);
    setTimeout(()=>startCountdown(form.weddingDate,t.accent,fontFamily,"countdown"),100);
  }
  hero.append(content);
  const scrollArrow=el("div",{class:"hero-scroll",style:`color:${t.accent}`},"▼");
  hero.append(scrollArrow);
  preview.append(hero);

  // ── STORY ──
  if(form.coupleStory){
    const sec=el("div",{class:"inv-section sr"});
    sec.style.background=t.grad;
    addSectionThemeAnim(sec, form.theme, t.accent);
    const inner=el("div",{class:"section-inner"});
    inner.innerHTML=`<div class="section-eyebrow" style="color:${t.accent}">Our Story</div><h2 class="section-title" style="font-family:${fontFamily};color:${tMain}">How It All Began</h2><div class="section-rule" style="background:${t.accent}"></div>`;
    const story=el("p",{class:"story-text",style:`color:${tSub};font-family:${t.bodyFont}`},`"${form.coupleStory}"`);
    inner.append(story);
    sec.append(inner); preview.append(sec);
  }

  // ── EVENTS ──
  const validEvents=form.events.filter(e=>e.name);
  if(validEvents.length>0){
    const sec=el("div",{class:"inv-section"});
    sec.style.background=t.grad;
    addSectionThemeAnim(sec, form.theme, t.accent);
    const inner=el("div",{class:"section-inner"});
    inner.innerHTML=`<div class="section-eyebrow sr" style="color:${t.accent}">Celebrations</div><h2 class="section-title sr" style="font-family:${fontFamily};color:${tMain}">Wedding Events</h2><div class="section-rule sr" style="background:${t.accent}"></div>`;

    // Cards grid
    const grid=el("div",{class:"events-grid"});
    validEvents.forEach((ev,i)=>{
      const card=el("div",{class:`event-card sr`,style:`background:${t.cardBg};border:1px solid ${t.cardBorder};`});
      const photoArea=el("div",{class:"event-card-photo"});
      if(ev.photo){
        const img=el("img"); img.src=ev.photo;
        const ov=el("div",{class:"event-card-photo-overlay"});
        photoArea.append(img,ov);
      } else {
        const noPhoto=el("div",{class:"event-card-no-photo"});
        noPhoto.innerHTML=`<span style="font-size:2.5rem">${["💍","🌸","🪔","🎊","🎶","🌺","✨","🎭"][i%8]}</span><span style="color:${t.accent};font-size:12px">No Photo Added</span>`;
        photoArea.append(noPhoto);
      }
      const numBadge=el("div",{class:"event-num-badge",style:`background:${t.accent};color:${t.isDark?"#1a0a0a":"#fff"}`},String(i+1));
      photoArea.append(numBadge);
      const body=el("div",{class:"event-card-body"});
      body.innerHTML=`<div class="event-card-name" style="color:${tMain};font-family:${fontFamily}">${ev.name}</div>${ev.date?`<div class="event-card-date" style="color:${t.accent}">${fmtDate(ev.date)}</div>`:""}${ev.time?`<div class="event-card-time" style="color:${tSub}">${fmtTime(ev.time)}</div>`:""}${ev.location?`<div class="event-card-loc" style="color:${tSub}">📍 ${ev.location}</div>`:""}`;
      card.append(photoArea,body); grid.append(card);
    });
    inner.append(grid);

    // Timeline
    const tlLabel=el("div",{class:"timeline-label sr",style:`color:${tSub}`},"Full Schedule Timeline");
    inner.append(tlLabel);
    const tl=el("div",{class:"timeline"});
    const tlLine=el("div",{class:"timeline-line",style:`background:linear-gradient(to bottom,transparent,${t.accent}50,${t.accent}70,${t.accent}50,transparent)`});
    tl.append(tlLine);
    validEvents.forEach((ev,i)=>{
      const item=el("div",{class:`tl-item ${i%2===0?"left sr-l":"right sr-r"}`});
      const card=el("div",{class:"tl-card",style:`background:${t.cardBg};border:1px solid ${t.cardBorder};backdrop-filter:blur(20px)`});
      card.innerHTML=`<div class="tl-name" style="color:${t.accent}">${ev.name}</div>${ev.date?`<div class="tl-date" style="color:${tSub}">${fmtDate(ev.date)}</div>`:""}${ev.time?`<div class="tl-time" style="color:${t.accent};opacity:.8">${fmtTime(ev.time)}</div>`:""}${ev.location?`<div class="tl-loc" style="color:${tSub}">📍 ${ev.location}</div>`:""}`;
      const dot=el("div",{class:"tl-dot",style:`background:${t.accent};box-shadow:0 0 14px ${t.accent}80`});
      item.append(card); tl.append(item,dot);
    });
    inner.append(tl);
    sec.append(inner); preview.append(sec);
  }

  // ── GALLERY ──
  {
    const sec=el("div",{class:"inv-section sr"});
    sec.style.background=t.grad;
    addSectionThemeAnim(sec, form.theme, t.accent);
    const inner=el("div",{class:"section-inner"});
    inner.innerHTML=`<div class="section-eyebrow" style="color:${t.accent}">Memories</div><h2 class="section-title" style="font-family:${fontFamily};color:${tMain}">Our Gallery</h2><div class="section-rule" style="background:${t.accent}"></div>`;

    if(gallery.length>=3){
      const heroGrid=el("div",{class:"gallery-hero"});
      const tall=el("div",{class:"gallery-cell gallery-tall"}); const img0=el("img"); img0.src=gallery[0]; tall.append(img0);
      const col=el("div",{style:"display:grid;grid-template-rows:1fr 1fr;gap:10px;"});
      [gallery[1],gallery[2]].forEach(src=>{ const c=el("div",{class:"gallery-cell"}); const img=el("img"); img.src=src; c.append(img); col.append(c); });
      const c3=el("div",{class:"gallery-cell"+(gallery.length>4?" gallery-overflow":"")});
      const img3=el("img"); img3.src=gallery[3]||gallery[0]; c3.append(img3);
      if(gallery.length>4){
        const mask=el("div",{class:"gallery-overflow-mask",style:`color:${tMain}`});
        mask.innerHTML=`<span>+${gallery.length-4}</span><span>more</span>`;
        c3.append(mask);
      }
      heroGrid.append(tall,col,c3); inner.append(heroGrid);
    }
    if(gallery.length>4){
      const row=el("div",{class:"gallery-row"});
      gallery.slice(4,8).forEach(src=>{ const c=el("div",{class:"gallery-cell"}); const img=el("img"); img.src=src; c.append(img); row.append(c); });
      inner.append(row);
    }
    // Floating polaroids from hero photos
    if(form.heroPhotos&&form.heroPhotos.length>0){
      const wall=el("div",{class:"polaroid-wall sr"});
      const sizes=[{w:"130px",h:"170px"},{w:"120px",h:"155px"},{w:"140px",h:"175px"},{w:"115px",h:"150px"},{w:"135px",h:"165px"}];
      const rots=["-5deg","3deg","-2deg","5deg","-4deg"];
      form.heroPhotos.slice(0,5).forEach((src,i)=>{
        const pol=el("div",{class:"polaroid"});
        pol.style.cssText=`width:${sizes[i%sizes.length].w};height:${sizes[i%sizes.length].h};transform:rotate(${rots[i%rots.length]});animation-delay:${i*.4}s;--rot:${rots[i%rots.length]};border-color:${t.accent}45;`;
        const img=el("img"); img.src=src; pol.append(img); wall.append(pol);
      });
      inner.append(wall);
    }
    sec.append(inner); preview.append(sec);
  }

  // ── LOCATION ──
  if(form.venueAddress||form.venue){
    const sec=el("div",{class:"inv-section sr"});
    sec.style.background=t.grad;
    addSectionThemeAnim(sec, form.theme, t.accent);
    const inner=el("div",{class:"section-inner",style:"max-width:800px;text-align:center;position:relative;z-index:1"});
    inner.innerHTML=`<div class="section-eyebrow" style="color:${t.accent}">Find Us</div><h2 class="section-title" style="font-family:${fontFamily};color:${tMain}">${form.venue||"The Venue"}</h2>${form.venueAddress?`<p style="color:${tSub};margin-bottom:32px;font-size:1rem">${form.venueAddress}</p>`:""}`;
    const box=el("div",{class:"location-box",style:`border:1px solid ${t.accent}20;background:${t.cardBg};backdrop-filter:blur(20px)`});
    box.innerHTML=`<div class="loc-icon">🗺️</div><p class="loc-addr" style="color:${tSub}">${form.venueAddress||form.venue}</p>`;
    if(form.mapsLink){
      const a=el("a",{class:"loc-maps-btn",href:form.mapsLink,target:"_blank",style:`background:${t.accent};color:${t.isDark?"#1a0a0a":"#fff"}`},"Open in Google Maps ↗");
      box.append(a);
    }
    inner.append(box); sec.append(inner); preview.append(sec);
  }

  // ── RSVP ──
  if(form.enableRsvp){
    const sec=el("div",{class:"inv-section sr"});
    sec.style.background=t.grad;
    addSectionThemeAnim(sec, form.theme, t.accent);
    const inner=el("div",{class:"section-inner",style:"max-width:480px;text-align:center;position:relative;z-index:1"});
    inner.innerHTML=`<div class="section-eyebrow" style="color:${t.accent}">RSVP</div><h2 class="section-title" style="font-family:${fontFamily};color:${tMain}">Will You Join Us?</h2><p style="color:${tSub};margin-bottom:28px;font-size:.9rem">Please confirm your attendance below.</p>`;
    const rsvpForm=el("div",{class:"rsvp-form",id:"rsvp-form-el",style:`background:${t.cardBg};border:1px solid ${t.accent}20;backdrop-filter:blur(20px)`});
    const nameInp=el("input",{class:"rsvp-input",type:"text",placeholder:"Your Name"});
    const phoneInp=el("input",{class:"rsvp-input",type:"tel",placeholder:"Phone Number"});
    const guestRow=el("div",{class:"rsvp-guests-row"});
    const guestSel=el("select",{class:"rsvp-guests-sel"});
    [1,2,3,4,5].forEach(n=>{ const o=el("option"); o.value=n; o.textContent=n; guestSel.append(o); });
    guestRow.append(el("span",{class:"rsvp-guests-label",style:`color:${tSub}`},"Number of Guests:"),guestSel);
    const submitBtn=el("button",{class:"rsvp-submit",style:`background:${t.accent};color:${t.isDark?"#1a0a0a":"#fff"};box-shadow:0 8px 24px ${t.accent}40`},"Confirm Attendance ✓");
    submitBtn.addEventListener("click",()=>{
      if(!nameInp.value)return;
      const thanks=el("div",{class:"rsvp-thanks",style:`background:${t.accent}18;border:1.5px solid ${t.accent}40`});
      thanks.innerHTML=`<div class="thanks-icon">💌</div><div class="thanks-title" style="color:${tMain};font-family:${fontFamily}">Thank you, ${nameInp.value}!</div><div class="thanks-sub" style="color:${tSub}">We can't wait to celebrate with you.</div>`;
      rsvpForm.replaceWith(thanks);
    });
    rsvpForm.append(nameInp,phoneInp,guestRow,submitBtn);
    inner.append(rsvpForm); sec.append(inner); preview.append(sec);
  }

  // ── FOOTER ──
  const footer=el("div",{class:"inv-footer",style:`border-top:1px solid ${t.accent}18;background:${t.grad};position:relative;overflow:hidden;`});
  addSectionThemeAnim(footer, form.theme, t.accent);
  // Footer inner content sits above the animation layer
  const footerInner=el("div",{style:"position:relative;z-index:1;"});
  footerInner.innerHTML=`<div class="inv-footer-title ${t.shimmer}" style="${!t.shimmer?`color:${t.accent}`:""};font-family:${fontFamily}">${title}</div><div class="inv-footer-date" style="color:${tSub}">${form.weddingDate?fmtDate(form.weddingDate):""}${form.venue?` • ${form.venue}`:""}</div>${form.contactPerson?`<div class="inv-footer-contact" style="color:${tSub}">Contact: ${form.contactPerson}${form.phone?" • "+form.phone:""}</div>`:""}<div class="inv-footer-credit">Made with ❤ using WeddingInvite.app</div>`;
  // Theme-specific footer flourish
  if(form.theme==="Royal Mughal"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.4rem;letter-spacing:.3em;opacity:.25">✦ 🪷 ✦ 🪷 ✦</div>`;
  } else if(form.theme==="Sindoor"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.4rem;letter-spacing:.25em;opacity:.3">🌼 ❋ 🌼 ❋ 🌼</div>`;
  } else if(form.theme==="Haldi"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.4rem;letter-spacing:.25em;opacity:.3">🌸 · 🌼 · 🌺 · 🌼 · 🌸</div>`;
  } else if(form.theme==="Nawabi"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.4rem;letter-spacing:.3em;opacity:.2">🏮 ✦ 🏮 ✦ 🏮</div>`;
  } else if(form.theme==="Theatre"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.1rem;letter-spacing:.4em;text-transform:uppercase;opacity:.25;font-family:'Cinzel Decorative',serif">— Fin —</div>`;
  } else if(form.theme==="Garden"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.4rem;letter-spacing:.25em;opacity:.35">🌷 ❀ 🌿 ❀ 🌷</div>`;
  } else if(form.theme==="Starlight"){
    footerInner.innerHTML+=`<div style="margin-top:18px;font-size:1.4rem;letter-spacing:.3em;opacity:.3">✦ ★ ✦ ★ ✦</div>`;
  }
  footer.append(footerInner);
  preview.append(footer);
}

// ══════════════════════════════════════════════
// SCROLL REVEAL
// ══════════════════════════════════════════════
function initScrollReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting)e.target.classList.add("vis"); });
  },{threshold:.08});
  document.querySelectorAll(".sr,.sr-l,.sr-r").forEach(el=>obs.observe(el));
}

document.getElementById("tb-edit").addEventListener("click",()=>{

  show("app-form");
});

  state.form={groomName:"",brideName:"",coupleTitle:"",coupleStory:"",weddingDate:"",weddingTime:"",venue:"",venueAddress:"",mapsLink:"",events:[{name:"Wedding Ceremony",date:"",time:"",location:"",photo:null}],contactPerson:"",phone:"",heroPhotos:[],photos:[],theme:"Royal Mughal",fontStyle:"Rozha One",enableRsvp:true};
  state.step=0;
  hide("app-preview"); document.getElementById("toolbar").style.display="none";
  show("app-form"); renderAll();
});
document.getElementById("tb-regen").addEventListener("click",()=>generateInvite(state.form));
document.getElementById("tb-share").addEventListener("click",()=>{
  const url=window.location.href.split("?")[0]+"?invite="+state.inviteId;
  document.getElementById("share-url-input").value=url;
  document.getElementById("share-wa-btn").onclick=()=>window.open("https://wa.me/?text="+encodeURIComponent(`You're invited to ${state.form.coupleTitle||state.form.groomName+" & "+state.form.brideName}'s wedding! 💍\n\n${url}`),"_blank");
  buildQR(document.getElementById("share-qr-svg"),state.form.coupleTitle||state.form.groomName+" & "+state.form.brideName,document.getElementById("share-qr-label"));
  show("share-modal");
});

// SHARE MODAL
// ══════════════════════════════════════════════
document.getElementById("share-copy-btn").addEventListener("click",()=>{
  const btn=document.getElementById("share-copy-btn");
  const val=document.getElementById("share-url-input").value;
  try{navigator.clipboard.writeText(val);}catch(e){prompt("Copy link:",val);}
  btn.textContent="✓"; btn.className="share-copy-btn copied";
  setTimeout(()=>{ btn.textContent="Copy"; btn.className="share-copy-btn"; },2500);
});
document.getElementById("share-close-btn").addEventListener("click",()=>hide("share-modal"));
document.getElementById("share-modal").addEventListener("click",e=>{ if(e.target===document.getElementById("share-modal"))hide("share-modal"); });
